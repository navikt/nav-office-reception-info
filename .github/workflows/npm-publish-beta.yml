name: Publish beta
on: workflow_dispatch

jobs:
  publish:
    name: Publish to package registry
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Build and publish package
        uses: ./.github/actions/build-and-publish-package
        with:
          releaseType: beta
          id: version-bump-beta

      - name: Push version changes
        if: steps.publish.outcome == 'success'
        run: git push origin HEAD:${{ github.ref_name }}

      - name: Create beta release
        if: steps.publish.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version-bump-beta.outputs.version_tag }}
          name: ${{ steps.version-bump-beta.outputs.version_tag }} (Beta)
          body: |
            🧪 **Beta Release**
            
            This is a pre-release version for testing purposes.
            
            **Installation:**
            ```bash
            pnpm install @navikt/nav-office-reception-info@beta
            ```
            
            Please report any issues you encounter!
          prerelease: true
